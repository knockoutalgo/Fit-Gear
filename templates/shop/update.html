<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Update Artifact</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body { background:#0b0a0a; color:#e8d9b8; font-family:"Courier New", monospace; }

    .scroll {
        background:#1b1815;
        border:2px solid #4d3b2f;
        padding:25px;
        max-width:650px;
        margin:auto;
        margin-top:50px;
        border-radius:10px;
        box-shadow:0 0 35px rgba(0,0,0,0.6);
    }

    .btn-darkfantasy {
        background:#3c322a;
        color:#e8d9b8;
        border:1px solid #6b5a49;
    }
</style>
</head>

<body>

<div class="scroll">
    <h2>Edit Artifact File</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div style="line-height:1.7;">
            {{ form.as_p }}
        </div>

        <button class="btn btn-darkfantasy w-100 mt-3">Save</button>
    </form>

    <a href="{% url 'shop:shoppy' %}" class="btn btn-outline-light w-100 mt-3">Cancel</a>
</div>

</body>
</html>
