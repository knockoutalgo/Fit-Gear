<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Academy Gate — Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background:#0b0a0a;
        font-family:"Courier New", monospace;
        color:#e8d9b8;
    }

    .gate {
        background:#1b1714;
        border:2px solid #4c3d30;
        width:400px;
        margin:auto;
        margin-top:65px;
        padding:20px;
        border-radius:10px;
        box-shadow:0 0 35px rgba(0,0,0,0.6);
    }

    .btn-darkfantasy {
        background:#3c322a;
        border:1px solid #6b5a49;
        color:#e8d9b8;
    }
    .btn-darkfantasy:hover {
        background:#4e4238;
        color:white;
    }

    label {
        margin-top:5px;
    }
</style>
</head>

<body>

<div class="gate">
    <h3>Academy Registration</h3>

    <form method="POST">
        {% csrf_token %}

        <label>Agent Name</label>
        <input type="text" name="username" class="form-control"
            value="{{ username|default:'' }}"
            style="background:#29241f;color:#e8d9b8;border:1px solid #4d4639;" required>

        <label>Email Address</label>
        <input type="email" name="email" class="form-control"
            value="{{ email|default:'' }}"
            style="background:#29241f;color:#e8d9b8;border:1px solid #4d4639;" required>

        <label>Create Secret Code</label>
        <input type="password" name="password" class="form-control"
            style="background:#29241f;color:#e8d9b8;border:1px solid #4d4639;" required>

        <label>Confirm Secret Code</label>
        <input type="password" name="confirm_password" class="form-control mb-3"
            style="background:#29241f;color:#e8d9b8;border:1px solid #4d4639;" required>

        <button class="btn btn-darkfantasy w-100">Register</button>
    </form>

    {% for m in messages %}
        <p class="text-danger mt-3">{{ m }}</p>
    {% endfor %}
</div>

</body>
</html>
