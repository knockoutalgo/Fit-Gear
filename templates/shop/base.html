<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Academy of Shadows — Artifact Registry</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: #0c0a09;
        color: #e8d9b8;
        font-family: "Courier New", monospace;
    }

    .scroll {
        background: radial-gradient(#2b2420, #0c0a09);
        border: 2px solid #4d3b2f;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 30px rgba(0,0,0,0.7);
        margin-bottom: 20px;
    }

    .header {
        font-size: 32px;
        text-align: center;
        color: #d1b38c;
        text-shadow: 0 0 6px #8e7359;
        margin-bottom: 30px;
        letter-spacing: 3px;
    }

    .artifact {
        background: #1a1613;
        border: 1px solid #564639;
        padding: 16px;
        border-radius: 8px;
    }

    .btn-darkfantasy {
        background:#3c322a;
        border:1px solid #6b5a49;
        color:#e8d9b8;
    }
    .btn-darkfantasy:hover {
        background:#4e4238;
        color:white;
    }
</style>
</head>

<body>

<div class="container mt-4" style="max-width:900px;">

    <div class="header">ACADEMY OF SHADOWS — ARTIFACT REGISTRY</div>

    <a href="{% url 'shop:create' %}" class="btn btn-darkfantasy mb-3">Add New Artifact</a>
    <a href="{% url 'shop:logout' %}" class="btn btn-danger mb-3 ms-2">Logout</a>
    <a href="{% url 'shop:cart' %}" class="btn btn-darkfantasy mb-3 ms-2">View Cart</a>

<form method="get">
  <input type="text" name="q" placeholder="Search..." value="{{ q }}">
  <button type="submit">Search</button>
</form>
    {% for s in samaan %}
    <div class="scroll">
        <h3>{{ s.name }}</h3>
        <p style="color:#c4b59a;">Worth: ₹{{ s.price }}</p>
        <p style="color:#9e8c75;">{{ s.desc|truncatewords:12 }}</p>
        <p style="color:#9e8c75;">Vendor Name: {{ s.user }}</p>

        <a href="{% url 'shop:read' s.id %}" class="btn btn-darkfantasy mt-2">Inspect</a>
        <a href="{% url 'shop:update' s.id %}" class="btn btn-warning ms-2 mt-2">Edit</a>

        <form action="{% url 'shop:add_cart' s.id %}" method="POST">
            {% csrf_token %}
            <button class="btn btn-darkfantasy mt-2" type="submit">Add to Cart</button>
        </form>
                
        <!-- <form action="{% url 'shop:delete' s.id %}" method="GET" style="display:inline;">
            {% csrf_token %}
            <button class="btn btn-danger ms-2 mt-2">Destroy</button>
        </form> -->
        <a href="{% url 'shop:delete' s.id %}" class="btn btn-danger ms-2 mt-2">Destroy</a>

    </div>
    {% endfor %}
</div>

</body>
</html>
